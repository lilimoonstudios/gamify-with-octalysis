<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Octalysis Playground — Experience the Drives</title>
  <style>
    :root {
      --bg:#0d1117; --surface:#161b22; --border:#30363d;
      --text:#e6edf3; --muted:#8b949e; --dim:#6b7280;
      --cd1:#F59E0B; --cd2:#3B82F6; --cd3:#8B5CF6; --cd4:#10B981;
      --cd5:#EC4899; --cd6:#F97316; --cd7:#06B6D4; --cd8:#EF4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }

    /* NAV */
    .pg-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 32px; background: var(--surface); position: sticky;
      top: 0; z-index: 300; border-bottom: 1px solid var(--border);
    }
    .pg-nav-logo {
      font-size: .7rem; font-weight: 800; letter-spacing: 1px;
      text-transform: uppercase; color: #a78bfa; background: #1a0d3f;
      border: 1px solid #6d28d9; border-radius: 20px; padding: 5px 14px;
      text-decoration: none;
    }
    .pg-nav-right { display: flex; align-items: center; gap: 12px; }
    .pg-nav-learn {
      font-size: .75rem; font-weight: 700; padding: 6px 14px;
      border-radius: 20px; background: #fff; color: #111;
      border: 1px solid #E5E7EB; text-decoration: none;
    }
    .pg-nav-learn:hover { background: #f9fafb; }
    .pg-nav-active { font-size: .8rem; font-weight: 700; color: var(--muted); }

    /* HERO */
    .pg-hero {
      text-align: center; padding: 56px 24px 48px;
      border-bottom: 1px solid var(--border);
    }
    .pg-hero h1 {
      font-size: 2.2rem; font-weight: 900; letter-spacing: -.04em;
      color: var(--text); margin-bottom: 10px;
    }
    .pg-hero p { font-size: .98rem; color: var(--muted); max-width: 480px; margin: 0 auto; }

    /* 3-PANEL HUB */
    .hub {
      max-width: 1280px; margin: 0 auto; padding: 48px 24px 64px;
      display: grid; grid-template-columns: 1fr 320px 1fr; gap: 32px;
      align-items: start;
    }
    .hub-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; min-height: 400px;
    }
    .hub-panel-label {
      font-size: .65rem; font-weight: 700; letter-spacing: .8px;
      text-transform: uppercase; color: var(--dim); margin-bottom: 16px;
    }

    /* Octagon hub */
    .hub-oct-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    #pg-oct-svg { width: 280px; height: 280px; cursor: pointer; }
    .hub-oct-hint { font-size: .72rem; color: var(--dim); text-align: center; }

    /* Desc panel (left) */
    .desc-cd-num { font-size: 2rem; font-weight: 900; margin-bottom: 4px; }
    .desc-drive-name { font-size: 1.1rem; font-weight: 800; color: var(--text); margin-bottom: 12px; }
    .desc-body { font-size: .88rem; color: var(--muted); line-height: 1.7; margin-bottom: 16px; }
    .desc-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .desc-tag {
      font-size: .62rem; font-weight: 700; padding: 3px 8px;
      border-radius: 8px; border: 1px solid var(--border); color: var(--muted);
    }
    .desc-read-link { font-size: .8rem; font-weight: 600; color: #58a6ff; text-decoration: none; }
    .desc-read-link:hover { text-decoration: underline; }
    .desc-empty { color: var(--dim); font-size: .9rem; margin-top: 60px; text-align: center; }

    /* Demo panel (right) */
    .demo-title { font-size: .95rem; font-weight: 800; color: var(--text); margin-bottom: 16px; }
    .demo-empty { color: var(--dim); font-size: .9rem; margin-top: 60px; text-align: center; }

    /* Fade-in animation */
    .panel-content { opacity: 0; transform: translateY(6px); transition: opacity .3s, transform .3s; }
    .panel-content.visible { opacity: 1; transform: translateY(0); }

    /* TAB BAR */
    .tab-bar {
      display:flex; overflow-x:auto; border-bottom:1px solid var(--border);
      margin:-4px 0 16px; scrollbar-width:none;
    }
    .tab-bar::-webkit-scrollbar { display:none; }
    .tab-btn {
      padding:8px 14px; font-size:.7rem; font-weight:700; white-space:nowrap;
      border:none; border-bottom:2px solid transparent; background:none;
      cursor:pointer; color:var(--muted); transition:all .15s; flex-shrink:0;
    }
    .tab-btn:hover { color:var(--text); }

    /* FOOTER */
    .pg-footer {
      text-align: center; padding: 24px; border-top: 1px solid var(--border);
      font-size: .82rem; color: var(--dim);
    }
    .pg-footer a { color: #58a6ff; text-decoration: none; }
    .pg-footer a:hover { text-decoration: underline; }

    /* Responsive */
    @media (max-width: 900px) {
      .hub { grid-template-columns: 1fr; }
      #pg-oct-svg { width: 220px; height: 220px; }
    }
  </style>
</head>
<body>

<nav class="pg-nav">
  <a href="index.html" class="pg-nav-logo">Octalysis</a>
  <div class="pg-nav-right">
    <a href="index.html" class="pg-nav-learn">📖 Learn</a>
    <span class="pg-nav-active">🎮 Playground</span>
  </div>
</nav>

<section class="pg-hero">
  <h1>Experience the Drives</h1>
  <p>Click a segment on the octagon to activate a drive demo.</p>
</section>

<div class="hub">
  <!-- Left: Description -->
  <div class="hub-panel" id="desc-panel">
    <div class="hub-panel-label">Framework Item</div>
    <div id="desc-content" class="panel-content">
      <div class="desc-empty">← Select a drive to explore</div>
    </div>
  </div>

  <!-- Center: Octagon -->
  <div class="hub-oct-wrap">
    <svg id="pg-oct-svg" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="hub-oct-hint" id="oct-hint">Click a drive segment</div>
  </div>

  <!-- Right: Demo -->
  <div class="hub-panel" id="demo-panel">
    <div class="hub-panel-label">Live Demo</div>
    <div id="demo-content" class="panel-content">
      <div class="demo-empty">← Select a drive to see a demo</div>
    </div>
  </div>
</div>

<footer class="pg-footer">
  Octalysis Framework by <a href="https://yukaichou.com" target="_blank" rel="noopener">Yu-kai Chou</a> &nbsp;·&nbsp;
  <a href="index.html">📖 Read the full framework →</a>
</footer>

<script>
const SVG_NS = 'http://www.w3.org/2000/svg';
const DRIVES = [
  { cd:1, name:'Epic Meaning & Calling',      icon:'🌐', color:'#F59E0B',
    hat:'⬜ White Hat', brain:'🧠 Right Brain',
    desc:'The belief that you are doing something greater than yourself. When users feel chosen for a mission, effort becomes purposeful.',
    tabs:[
      {name:'Mission Counter', render:()=>renderMissionCounter(), init:()=>{}},
      {name:'Narrative',       render:()=>renderNarrative(),      init:()=>initNarrative()},
      {name:'Humanity Hero',   render:()=>renderHumanityHero(),   init:()=>{}},
      {name:'Co-creationist',  render:()=>renderCoCreationist(),  init:()=>initCoCreationist()},
    ]},
  { cd:2, name:'Development & Accomplishment', icon:'🏆', color:'#3B82F6',
    hat:'⬜ White Hat', brain:'🔢 Left Brain',
    desc:'The internal drive to progress, develop skills, and overcome challenges. Progress bars and XP make invisible growth visible.',
    tabs:[
      {name:'XP Level-Up',  render:()=>renderXPLevelUp(),   init:()=>initXPLevelUp()},
      {name:'Leaderboard',  render:()=>renderLeaderboard(),  init:()=>initLeaderboard()},
      {name:'Boss Fight',   render:()=>renderBossFight(),    init:()=>initBossFight()},
      {name:'Quest List',   render:()=>renderQuestList(),    init:()=>initQuestList()},
    ]},
  { cd:3, name:'Empowerment of Creativity',    icon:'🧩', color:'#8B5CF6',
    hat:'⬜ White Hat', brain:'🧠 Right Brain',
    desc:'The drive to try new combinations and get meaningful feedback. When every choice leads to a unique outcome, creativity loops become addictive.',
    tabs:[
      {name:'Combo Builder',    render:()=>renderComboBuilder(),    init:()=>initComboBuilder()},
      {name:'Chain Combos',     render:()=>renderChainCombos(),     init:()=>initChainCombos()},
      {name:'Milestone Unlock', render:()=>renderMilestoneUnlock(), init:()=>initMilestoneUnlock()},
      {name:'Dyn. Feedback',    render:()=>renderDynFeedback(),     init:()=>{}},
    ]},
  { cd:4, name:'Ownership & Possession',       icon:'📦', color:'#10B981',
    hat:'⬜ White Hat', brain:'🔢 Left Brain',
    desc:'The drive to accumulate and protect things you own. Collection, virtual currency, and customisation trigger this drive deeply.',
    tabs:[
      {name:'Passport Stamps',    render:()=>renderPassportStamps(),  init:()=>initPassportStamps()},
      {name:'Avatar Builder',     render:()=>renderAvatarBuilder(),   init:()=>{}},
      {name:'Virtual Goods',      render:()=>renderVirtualGoods(),    init:()=>initVirtualGoods()},
      {name:'Build from Scratch', render:()=>renderBuildFromScratch(),init:()=>initBuildFromScratch()},
    ]},
  { cd:5, name:'Social Influence & Relatedness', icon:'👥', color:'#EC4899',
    hat:'⬜ White Hat', brain:'🧠 Right Brain',
    desc:'The drive to collaborate, compete, and belong. Seeing what peers do creates social benchmarking and conformity pressure.',
    tabs:[
      {name:'Live Pulse',     render:()=>renderLivePulse(),    init:()=>initLivePulse()},
      {name:'Trophy Shelf',   render:()=>renderTrophyShelf(),  init:()=>{}},
      {name:'Group Quest',    render:()=>renderGroupQuest(),   init:()=>{}},
      {name:'Social Gifting', render:()=>renderSocialGifting(),init:()=>{}},
    ]},
  { cd:6, name:'Scarcity & Impatience',        icon:'⏳', color:'#F97316',
    hat:'⬛ Black Hat', brain:'🔢 Left Brain',
    desc:'Wanting something more because you cannot have it yet. Countdown timers and limited availability create urgent desire.',
    tabs:[
      {name:'Event Ticket',    render:()=>renderEventTicket(),         init:()=>initEventTicket()},
      {name:'Appointment',     render:()=>renderAppointmentDynamics(), init:()=>initAppointmentDynamics()},
      {name:'Last Mile Drive', render:()=>renderLastMileDrive(),       init:()=>{}},
      {name:'Prize Pacing',    render:()=>renderPrizePacing(),         init:()=>{}},
    ]},
  { cd:7, name:'Unpredictability & Curiosity', icon:'🎲', color:'#06B6D4',
    hat:'⬛ Black Hat', brain:'🧠 Right Brain',
    desc:'Not knowing what comes next keeps the brain engaged. Variable rewards and hidden surprises create compulsive curiosity.',
    tabs:[
      {name:'Scratch Card', render:()=>renderScratchCard(), init:()=>initScratchCard()},
    ]},
  { cd:8, name:'Loss & Avoidance',             icon:'🚩', color:'#EF4444',
    hat:'⬛ Black Hat', brain:'🔢 Left Brain',
    desc:'The drive to avoid losing what you already have. Streaks at risk, expiring progress, and FOMO are powerful motivators.',
    tabs:[
      {name:'Streak Tracker', render:()=>renderStreakTracker(), init:()=>initStreakTracker()},
    ]},
];

let activeCd = null;

// Interval handles for all auto-running demos (cleared on drive/tab switch)
let apptInterval = null;
let lossInterval = null;
let fomoInterval = null;
let rollInterval = null;
let chainTimer   = null;

// ── Build playground octagon ────────────────────────────────────
const pgSvg = document.getElementById('pg-oct-svg');
const CX = 140, CY = 140, R = 110;

function vtx(i, r) {
  const a = (-90 + i * 45) * Math.PI / 180;
  return { x: CX + r * Math.cos(a), y: CY + r * Math.sin(a) };
}

const segments = [];

DRIVES.forEach((d, i) => {
  const va = vtx(i, R), vb = vtx(i + 1, R);
  const poly = document.createElementNS(SVG_NS, 'polygon');
  poly.setAttribute('points', `${CX},${CY} ${va.x},${va.y} ${vb.x},${vb.y}`);
  poly.setAttribute('fill', d.color);
  poly.setAttribute('opacity', '0.2');
  poly.setAttribute('stroke', '#0d1117');
  poly.setAttribute('stroke-width', '2');
  poly.style.cursor = 'pointer';
  poly.style.transition = 'opacity .2s';
  pgSvg.appendChild(poly);
  segments.push(poly);

  // Hover
  poly.addEventListener('mouseenter', () => {
    if (activeCd !== d.cd) poly.setAttribute('opacity', '0.7');
    document.getElementById('oct-hint').textContent = d.name;
  });
  poly.addEventListener('mouseleave', () => {
    if (activeCd !== d.cd) poly.setAttribute('opacity', '0.2');
    document.getElementById('oct-hint').textContent = activeCd ? DRIVES[activeCd-1].name : 'Click a drive segment';
  });
  poly.addEventListener('click', () => activateDrive(d.cd));
});

// Center circle
const cc = document.createElementNS(SVG_NS, 'circle');
cc.setAttribute('cx', CX); cc.setAttribute('cy', CY);
cc.setAttribute('r', '36'); cc.setAttribute('fill', '#161b22');
cc.setAttribute('stroke', '#30363d'); cc.setAttribute('stroke-width', '1.5');
pgSvg.appendChild(cc);
const ct = document.createElementNS(SVG_NS, 'text');
ct.setAttribute('x', CX); ct.setAttribute('y', CY - 4);
ct.setAttribute('text-anchor', 'middle'); ct.setAttribute('dominant-baseline', 'middle');
ct.setAttribute('font-size', '8'); ct.setAttribute('font-weight', '900');
ct.setAttribute('fill', '#8b949e'); ct.setAttribute('font-family', 'system-ui, sans-serif');
ct.setAttribute('pointer-events', 'none'); ct.textContent = 'CLICK';
pgSvg.appendChild(ct);

// ── Clear all running demo intervals ────────────────────────────
function clearAllIntervals() {
  [pulseInterval, countdownInterval, apptInterval, lossInterval, fomoInterval, rollInterval, chainTimer]
    .forEach(id => { if (id) clearInterval(id); });
  pulseInterval = countdownInterval = apptInterval = lossInterval = fomoInterval = rollInterval = chainTimer = null;
}

// ── Tab bar renderer ────────────────────────────────────────────
function renderTabBar(d, activeIdx) {
  return d.tabs.map((t, i) =>
    `<button class="tab-btn"
      style="${i===activeIdx?`border-bottom-color:${d.color};color:${d.color}`:''}"
      onclick="switchTab(${d.cd},${i})">${t.name}</button>`
  ).join('');
}

// ── Activate a specific tab within the active drive ─────────────
function activateTab(cd, tabIdx) {
  clearAllIntervals();
  const d   = DRIVES[cd - 1];
  const tab = d.tabs[tabIdx];
  const demoEl = document.getElementById('demo-content');
  demoEl.classList.remove('visible');
  demoEl.innerHTML = `<div class="tab-bar">${renderTabBar(d, tabIdx)}</div>${tab.render()}`;
  requestAnimationFrame(() => { demoEl.classList.add('visible'); tab.init(); });
}

window.switchTab = function(cd, tabIdx) { activateTab(cd, tabIdx); };

// ── Activate a drive ────────────────────────────────────────────
function activateDrive(cd) {
  activeCd = cd;
  const d = DRIVES[cd - 1];

  // Update segment opacities
  segments.forEach((p, i) => {
    const isActive = i === cd - 1;
    p.setAttribute('opacity', isActive ? '1' : '0.15');
    if (isActive) {
      p.style.filter = `drop-shadow(0 0 8px ${d.color})`;
    } else {
      p.style.filter = '';
    }
  });
  ct.textContent = `CD${cd}`;

  // Render description panel
  const descEl = document.getElementById('desc-content');
  descEl.classList.remove('visible');
  descEl.innerHTML = `
    <div class="desc-cd-num" style="color:${d.color}">CD${cd}</div>
    <div class="desc-drive-name">${d.icon} ${d.name}</div>
    <p class="desc-body">${d.desc}</p>
    <div class="desc-tags">
      <span class="desc-tag">${d.hat}</span>
      <span class="desc-tag">${d.brain}</span>
    </div>
    <a href="index.html#drive-${cd}" class="desc-read-link">→ Read full description</a>
  `;
  requestAnimationFrame(() => descEl.classList.add('visible'));

  // Render demo panel
  activateTab(cd, 0);
}

// ── CD1: Mission Counter ─────────────────────────────────────────
function renderMissionCounter() {
  return `
  <div class="demo-title">Mission Counter</div>
  <div style="background:#0d1117;border-radius:12px;padding:20px;border:1px solid #21262d;text-align:center">
    <div style="font-size:2.8rem;margin-bottom:8px">🌐</div>
    <div style="font-size:.7rem;color:#6b7280;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px">Community Members</div>
    <div id="mission-count" style="font-size:2.6rem;font-weight:900;color:#F59E0B;letter-spacing:-.03em;line-height:1">84,271</div>
    <div style="font-size:.78rem;color:#8b949e;margin-top:6px">designers, developers &amp; educators</div>
    <div style="display:flex;justify-content:center;gap:8px;margin-top:16px;flex-wrap:wrap">
      <span style="font-size:.68rem;padding:3px 10px;border-radius:12px;background:#78350f;color:#fde68a;border:1px solid #92400e">🎨 Designers: 31,402</span>
      <span style="font-size:.68rem;padding:3px 10px;border-radius:12px;background:#1e3a5f;color:#93c5fd;border:1px solid #1d4ed8">💻 Developers: 28,915</span>
      <span style="font-size:.68rem;padding:3px 10px;border-radius:12px;background:#064e3b;color:#6ee7b7;border:1px solid #059669">📚 Educators: 23,954</span>
    </div>
    <button id="mission-btn" onclick="addVoice()" style="margin-top:16px;background:#F59E0B;color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:.82rem;font-weight:700;cursor:pointer;transition:transform .15s">
      + Add Your Voice
    </button>
  </div>`;
}

window.addVoice = function() {
  const el = document.getElementById('mission-count');
  if (!el) return;
  const current = parseInt(el.textContent.replace(/,/g, ''), 10) + 1;
  el.textContent = current.toLocaleString();
  el.style.transform = 'scale(1.15)';
  el.style.color = '#fff';
  setTimeout(() => { el.style.transform = ''; el.style.color = '#F59E0B'; }, 300);
};

// ── CD1: Narrative ───────────────────────────────────────────────
const NARRATIVE_LINES = [
  '🌍 Every great product starts with a problem worth solving.',
  '💡 Somewhere, a designer saw friction where others saw routine.',
  '🛠 They built slowly, tested often, and listened carefully.',
  '🚀 And one day — it shipped. Not perfect, but real.',
  '🌐 That\'s how missions are born. What\'s yours?',
];
let narrativeIdx = 0;

function renderNarrative() {
  return `
  <div class="demo-title">Narrative</div>
  <div style="background:#0d1117;border-radius:12px;padding:20px;border:1px solid #21262d">
    <div style="font-size:.65rem;color:#6b7280;letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px">The Origin Story</div>
    <div id="narrative-lines" style="min-height:80px;margin-bottom:16px"></div>
    <button onclick="advanceNarrative()" id="narrative-btn"
      style="background:#F59E0B;color:#111;border:none;border-radius:8px;padding:8px 20px;font-size:.82rem;font-weight:700;cursor:pointer">
      ▶ Begin
    </button>
  </div>`;
}

window.advanceNarrative = function() {
  if (narrativeIdx >= NARRATIVE_LINES.length) return;
  const linesEl = document.getElementById('narrative-lines');
  if (!linesEl) return;
  const line = document.createElement('p');
  line.style.cssText = 'font-size:.85rem;color:#e6edf3;line-height:1.7;margin-bottom:6px;opacity:0;transition:opacity .4s';
  line.textContent = NARRATIVE_LINES[narrativeIdx];
  linesEl.appendChild(line);
  requestAnimationFrame(() => line.style.opacity = '1');
  narrativeIdx++;
  const btn = document.getElementById('narrative-btn');
  if (!btn) return;
  btn.textContent = narrativeIdx >= NARRATIVE_LINES.length ? '✓ Story Complete' : '▶ Next Chapter';
  if (narrativeIdx >= NARRATIVE_LINES.length) { btn.disabled = true; btn.style.opacity = '.5'; }
};

function initNarrative() { narrativeIdx = 0; }

// ── CD1: Humanity Hero ───────────────────────────────────────────
function renderHumanityHero() {
  return `
  <div class="demo-title">Humanity Hero</div>
  <div style="background:#0d1117;border-radius:12px;padding:20px;border:1px solid #21262d;text-align:center">
    <div style="font-size:2.2rem;margin-bottom:8px">🦸</div>
    <div style="font-size:.72rem;color:#6b7280;margin-bottom:4px">Your contributions have helped</div>
    <div id="hero-count" style="font-size:2.4rem;font-weight:900;color:#F59E0B;letter-spacing:-.03em">0</div>
    <div style="font-size:.78rem;color:#8b949e;margin-bottom:16px">people learn gamification design</div>
    <button onclick="heroContribute()"
      style="background:#F59E0B;color:#111;border:none;border-radius:8px;padding:8px 20px;font-size:.82rem;font-weight:700;cursor:pointer">
      + Make an Impact
    </button>
  </div>`;
}

window.heroContribute = function() {
  const el = document.getElementById('hero-count');
  if (!el) return;
  let current = parseInt(el.textContent.replace(/,/g, ''), 10);
  const target = current + Math.floor(Math.random() * 40 + 15);
  const step = () => {
    current = Math.min(current + Math.ceil((target - current) / 4), target);
    el.textContent = current.toLocaleString();
    if (current < target) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
};

// ── CD1: Co-creationist ──────────────────────────────────────────
let coVotes = { a: 62, b: 38 };
let coHasVoted = false;

function renderCoCreationist() {
  const total = coVotes.a + coVotes.b;
  const pctA = Math.round(coVotes.a / total * 100);
  const pctB = 100 - pctA;
  return `
  <div class="demo-title">Co-creationist</div>
  <div style="background:#0d1117;border-radius:12px;padding:20px;border:1px solid #21262d">
    <div style="font-size:.78rem;color:#e6edf3;font-weight:700;margin-bottom:4px">What should we build next?</div>
    <div style="font-size:.65rem;color:#6b7280;margin-bottom:14px">You're shaping the product roadmap</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div onclick="coVote('a')" id="co-opt-a"
        style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;cursor:pointer;transition:border-color .15s">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:.8rem;color:#e6edf3">🗺 Technique Explorer</span>
          <span id="co-pct-a" style="font-size:.72rem;font-weight:700;color:#F59E0B">${pctA}%</span>
        </div>
        <div style="height:5px;background:#21262d;border-radius:3px;overflow:hidden">
          <div id="co-bar-a" style="width:${pctA}%;height:100%;background:#F59E0B;transition:width .4s;border-radius:3px"></div>
        </div>
      </div>
      <div onclick="coVote('b')" id="co-opt-b"

window.chainTap = function() {
  const now = Date.now();
  if (now < chainDeadline) {
    chainMulti = Math.min(chainMulti + 1, 8);
  } else {
    chainMulti = 1;
  }
  chainDeadline = now + 1000;
  chainScore += chainMulti * 10;

  const multiEl = document.getElementById('chain-multi');
  const scoreEl = document.getElementById('chain-score');
  if (multiEl) { multiEl.textContent = '×'+chainMulti; multiEl.style.transform='scale(1.3)'; setTimeout(()=>{ const m=document.getElementById('chain-multi'); if(m) m.style.transform=''; },100); }
  if (scoreEl) scoreEl.textContent = 'Score: '+chainScore;

  if (chainTimer) clearInterval(chainTimer);
  const barEl = document.getElementById('chain-timer-bar');
  const start = Date.now();
  chainTimer = setInterval(() => {
    const elapsed = Date.now() - start;
    const pct = Math.max(0, 100 - (elapsed/1000*100));
    const b = document.getElementById('chain-timer-bar');
    if (b) b.style.width = pct+'%';
    if (elapsed >= 1000) {
      clearInterval(chainTimer); chainTimer=null; chainMulti=1;
      const m = document.getElementById('chain-multi');
      if (m) m.textContent='×1';
    }
  }, 50);
};

    const el = document.getElementById('pulse-feed');

    const msg = PULSE_MSGS[Math.floor(Math.random() * PULSE_MSGS.length)];
    const row = document.createElement('div');

    el.insertBefore(row, el.firstChild);
    requestAnimationFrame(() => row.style.opacity = '1');
    while (el.children.length > 5) el.removeChild(el.lastChild);
  }

}

    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">
      ${GIFT_TEAMMATES.map((t,i)=>`
      <div onclick="giftSelect(${i})" id="gift-tm-${i}"
        style="display:flex;align-items:center;justify-content:space-between;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:9px 12px;cursor:pointer;transition:border-color .15s">
        <span style="font-size:.78rem">${t}</span>
        <span id="gift-tm-xp-${i}" style="font-size:.65rem;color:#6b7280">— XP</span>
      </div>`).join('')}
    </div>
    <button onclick="giftSend()" id="gift-btn"
      style="background:#EC4899;color:#fff;border:none;border-radius:8px;padding:8px;font-size:.82rem;font-weight:700;cursor:pointer;width:100%;transition:opacity .2s;opacity:${giftSelected===null?'.5':'1'}">
      🎁 Send +50 XP Boost
    </button>
    <div id="gift-msg" style="display:none;font-size:.72rem;color:#10B981;text-align:center;margin-top:8px"></div>
  </div>`;
}

window.giftSelect = function(i) {
  giftSelected = i;
  GIFT_TEAMMATES.forEach((_,j) => {
    const el = document.getElementById(`gift-tm-${j}`);
    if (el) el.style.borderColor = j===i ? '#EC4899' : '#30363d';
  });
  const btn = document.getElementById('gift-btn');
  if (btn) btn.style.opacity = '1';
};

window.giftSend = function() {
  if (giftSelected === null) return;
  const xpEl = document.getElementById(`gift-tm-xp-${giftSelected}`);
  if (xpEl) { xpEl.textContent='+50 XP'; xpEl.style.color='#EC4899'; }
  const msg = document.getElementById('gift-msg');
  if (msg) { msg.textContent=`🎁 Boost sent to ${GIFT_TEAMMATES[giftSelected].split(' ')[0]}!`; msg.style.display='block'; }
  const btn = document.getElementById('gift-btn');
  if (btn) { btn.disabled=true; btn.style.opacity='.5'; btn.textContent='✓ Sent'; }
};

// ── CD6: Event Ticket ────────────────────────────────────────
let ticketClaimed = false;
let countdownInterval = null;
let remainingSeconds = 23 * 3600 + 47 * 60 + 12;

function renderEventTicket() {
  const seats = ticketClaimed ? 4 : 3;
  const seatsHtml = Array.from({length:5}, (_,i) =>
    i < seats
      ? `<div style="width:18px;height:18px;border-radius:50%;background:#F97316;border:2px solid #ea580c"></div>`
      : `<div style="width:18px;height:18px;border-radius:50%;border:2px dashed #30363d;background:#0d1117"></div>`
  ).join('');

  return `
  <div class="demo-title">Event Ticket</div>
  <div style="border-radius:12px;overflow:hidden;border:1px solid #30363d">
    <div style="background:linear-gradient(135deg,#7c2d12,#c2410c);padding:16px;text-align:center">
      <div style="font-size:.65rem;color:#fed7aa;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px">Octalysis Workshop</div>
      <div style="font-size:1.1rem;font-weight:900;color:#fff">Live Design Sprint</div>
    </div>
    <div style="background:#161b22;padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div>
          <div style="font-size:.62rem;color:#6b7280;text-transform:uppercase;letter-spacing:.6px">Time Remaining</div>
          <div id="ticket-countdown" style="font-size:1.6rem;font-weight:900;color:#F97316;letter-spacing:-.02em">23:47:12</div>
        </div>
        <div>
          <div style="font-size:.62rem;color:#6b7280;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px">Seats</div>
          <div style="display:flex;gap:4px">${seatsHtml}</div>
          <div style="font-size:.62rem;color:#F97316;margin-top:3px">${5-seats} of 5 remaining</div>
        </div>
      </div>
      <button id="ticket-btn" onclick="claimTicket()" ${ticketClaimed ? 'disabled' : ''}
        style="width:100%;background:${ticketClaimed ? '#21262d' : '#F97316'};color:${ticketClaimed ? '#6b7280' : '#fff'};border:none;border-radius:8px;padding:10px;font-size:.84rem;font-weight:700;cursor:${ticketClaimed ? 'default' : 'pointer'};transition:background .2s">
        ${ticketClaimed ? '✓ Spot Claimed' : 'Claim Your Spot'}
      </button>
    </div>
  </div>`;
}

window.claimTicket = function() {
  if (ticketClaimed) return;
  ticketClaimed = true;
  const demoEl = document.getElementById('demo-content');
  if (demoEl) demoEl.innerHTML = renderEventTicket();
  initEventTicket();
};

function formatCountdown(s) {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function initEventTicket() {
  ticketClaimed = false;
  remainingSeconds = 23 * 3600 + 47 * 60 + 12;
  if (countdownInterval) clearInterval(countdownInterval);
  const demoEl = document.getElementById('demo-content');
  if (demoEl) demoEl.innerHTML = renderEventTicket();
  countdownInterval = setInterval(() => {
    const el = document.getElementById('ticket-countdown');
    if (!el) { clearInterval(countdownInterval); return; }
    remainingSeconds = Math.max(0, remainingSeconds - 1);
    el.textContent = formatCountdown(remainingSeconds);
  }, 1000);
}

// ── CD6: Appointment Dynamics ────────────────────────────────────
// apptInterval declared in Task 1
let apptSeconds  = 8 * 60 + 42;
let apptClaimed  = false;

function renderAppointmentDynamics() {
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const doneDays = [0,1];
  const todayIdx = 2;
  const dots = days.map((d,i) => {
    let bg, border, color;
    if (apptClaimed && i===todayIdx) { bg='#10B981'; border='#059669'; color='#6ee7b7'; }
    else if (doneDays.includes(i)) { bg='#F97316'; border='#ea580c'; color='#fff'; }
    else if (i===todayIdx) { bg='transparent'; border='#F97316'; color='#F97316'; }
    else { bg='transparent'; border='#30363d'; color='#6b7280'; }
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px">
      <div style="width:28px;height:28px;border-radius:50%;background:${bg};border:2px solid ${border};display:flex;align-items:center;justify-content:center;font-size:.6rem;color:${color};font-weight:700">
        ${(apptClaimed&&i===todayIdx)||doneDays.includes(i)?'✓':d[0]}
      </div>
      <span style="font-size:.52rem;color:#6b7280">${d}</span>
    </div>`;
  }).join('');

  return `
  <div class="demo-title">Appointment Dynamics</div>
  <div style="background:#0d1117;border-radius:12px;padding:20px;border:1px solid #21262d;text-align:center">
    <div style="font-size:.7rem;color:#6b7280;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Daily Reward</div>
    <div style="font-size:.88rem;font-weight:800;color:#e6edf3;margin-bottom:12px">Come back every day to keep your streak</div>
    <div style="display:flex;justify-content:center;gap:6px;margin-bottom:16px">${dots}</div>
    ${apptClaimed
      ? `<div style="background:#064e3b;border:1px solid #059669;border-radius:8px;padding:10px;font-size:.78rem;font-weight:700;color:#6ee7b7">✓ Reward collected! Come back tomorrow.</div>`
      : `<div style="margin-bottom:10px">
          <div style="font-size:.62rem;color:#6b7280">Next reward expires in</div>
          <div id="appt-countdown" style="font-size:1.8rem;font-weight:900;color:#F97316;letter-spacing:-.02em">${formatCountdown(apptSeconds)}</div>
        </div>
        <button onclick="apptClaim()" style="background:#F97316;color:#fff;border:none;border-radius:8px;padding:9px 24px;font-size:.82rem;font-weight:700;cursor:pointer">
          Collect Today's Reward
        </button>`}
  </div>`;
}

window.apptClaim = function() {
  apptClaimed = true;
  if (apptInterval) { clearInterval(apptInterval); apptInterval=null; }
  const demoEl = document.getElementById('demo-content');
  if (demoEl) {
    const tabBar = demoEl.querySelector('.tab-bar');
    demoEl.innerHTML = (tabBar?tabBar.outerHTML:'') + renderAppointmentDynamics();
  }
};

function initAppointmentDynamics() {
  apptClaimed = false; apptSeconds = 8*60+42;
  if (apptInterval) clearInterval(apptInterval);
  const demoEl = document.getElementById('demo-content');
  if (demoEl) {
    const tabBar = demoEl.querySelector('.tab-bar');
    demoEl.innerHTML = (tabBar?tabBar.outerHTML:'') + renderAppointmentDynamics();
  }
  apptInterval = setInterval(() => {
    const el = document.getElementById('appt-countdown');
    if (!el) { clearInterval(apptInterval); apptInterval=null; return; }
    apptSeconds = Math.max(0, apptSeconds-1);
    el.textContent = formatCountdown(apptSeconds);
  }, 1000);
}

// ── CD6: Last Mile Drive ─────────────────────────────────────────
function renderLastMileDrive() {
  return `
  <div class="demo-title">Last Mile Drive</div>
  <div style="background:#0d1117;border-radius:12px;padding:20px;border:1px solid #21262d">
    <div style="font-size:.7rem;color:#6b7280;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">Level Progress</div>
    <div style="font-size:.88rem;font-weight:800;color:#e6edf3;margin-bottom:12px">You're almost there — just a little more!</div>
    <div style="display:flex;justify-content:space-between;font-size:.65rem;color:#6b7280;margin-bottom:4px">
      <span>Level 5 · Expert</span><span id="lm-label">850 / 1000 XP</span>
    </div>
    <div style="height:14px;background:#21262d;border-radius:7px;overflow:hidden;margin-bottom:6px">
      <div id="lm-bar" style="width:85%;height:100%;background:linear-gradient(90deg,#F97316,#F59E0B);border-radius:7px;transition:width .4s;box-shadow:0 0 10px rgba(249,115,22,.4)"></div>
    </div>
    <div style="font-size:.65rem;color:#F97316;text-align:right;margin-bottom:16px">Only 150 XP to go!</div>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${[['🎯 Complete one more task',50],['⚡ Use a daily boost',30],['🤝 Help a teammate',70]].map(([task,xp])=>`
      <div onclick="lmEarnXP(${xp},this)" style="display:flex;justify-content:space-between;align-items:center;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px 12px;cursor:pointer">
        <span style="font-size:.78rem">${task}</span>
        <span style="font-size:.68rem;font-weight:700;color:#F97316">+${xp} XP</span>
      </div>`).join('')}
    </div>
    <div id="lm-reward" style="display:none;background:#1a0e04;border:1px solid #F97316;border-radius:8px;padding:12px;text-align:center;margin-top:10px">
      <div style="font-size:1.2rem">🎉</div>
      <div style="font-size:.78rem;font-weight:700;color:#F59E0B">Level Up! Welcome to Expert.</div>
    </div>
  </div>`;
}

let lmXP = 850;

window.lmEarnXP = function(amount, el) {
  if (el.dataset.done) return;
  el.dataset.done='1'; el.style.opacity='.4'; el.style.pointerEvents='none';
  el.querySelector('span:last-child').textContent='✓';
  lmXP = Math.min(lmXP+amount, 1000);
  const bar = document.getElementById('lm-bar');
  const lbl = document.getElementById('lm-label');
  if (bar) bar.style.width=(lmXP/1000*100)+'%';
  if (lbl) lbl.textContent=lmXP+' / 1000 XP';
  if (lmXP>=1000) { const r=document.getElementById('lm-reward'); if(r) r.style.display='block'; }
};

// ── CD6: Prize Pacing ────────────────────────────────────────────
const PRIZE_TIERS = [
  {xp:0,   icon:'🥉', name:'Bronze',  desc:'Access to basic templates',         color:'#cd7f32'},
  {xp:100, icon:'🥈', name:'Silver',  desc:'Unlock the Combo Builder pro mode', color:'#9ca3af'},
  {xp:250, icon:'🥇', name:'Gold',    desc:'Early access to new techniques',    color:'#F59E0B'},
  {xp:500, icon:'💎', name:'Diamond', desc:'Personal feedback from the team',   color:'#06B6D4'},
];
let prizeXP = 0;

function renderPrizePacing() {
  return `
  <div class="demo-title">Prize Pacing</div>
  <div style="background:#0d1117;border-radius:12px;padding:16px;border:1px solid #21262d">
    <div style="font-size:.68rem;color:#6b7280;margin-bottom:12px">Each milestone reveals the next reward</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">
      ${PRIZE_TIERS.map(t=>{
        const unlocked = prizeXP>=t.xp;
        return `<div style="display:flex;align-items:center;gap:10px;background:#161b22;border:1px solid ${unlocked?t.color:'#30363d'};border-radius:8px;padding:10px 12px;opacity:${unlocked?'1':'.5'}">
          <span style="font-size:1.3rem">${unlocked?t.icon:'🔒'}</span>
          <div style="flex:1">
            <div style="font-size:.75rem;font-weight:700;color:${unlocked?t.color:'#6b7280'}">${t.name}</div>
            <div style="font-size:.65rem;color:#6b7280">${unlocked?t.desc:'Reach '+t.xp+' XP to reveal'}</div>
          </div>
          ${unlocked?`<span style="font-size:.62rem;font-weight:700;color:${t.color}">Unlocked</span>`:''}
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;font-size:.65rem;color:#6b7280;margin-bottom:4px">
      <span>Your XP</span><span id="pp-label">${prizeXP} XP</span>
    </div>
    <div style="height:6px;background:#21262d;border-radius:3px;overflow:hidden;margin-bottom:12px">
      <div id="pp-bar" style="width:${Math.min(prizeXP/500*100,100)}%;height:100%;background:linear-gradient(90deg,#F97316,#F59E0B);border-radius:3px;transition:width .4s"></div>
    </div>
    <button onclick="ppEarnXP()" style="background:#F97316;color:#fff;border:none;border-radius:8px;padding:8px;font-size:.82rem;font-weight:700;cursor:pointer;width:100%">
      + Earn 75 XP
    </button>
  </div>`;
}

window.ppEarnXP = function() {
  prizeXP = Math.min(prizeXP+75, 500);
  const demoEl = document.getElementById('demo-content');
  if (demoEl) {
    const tabBar = demoEl.querySelector('.tab-bar');
    demoEl.innerHTML = (tabBar?tabBar.outerHTML:'') + renderPrizePacing();
  }
};

// ── CD7: Scratch Card ────────────────────────────────────────
const SCRATCH_POOL = [
  {name:'Variable Reward', desc:'Unpredictable payoffs are more motivating than predictable ones.'},
  {name:'Easter Egg', desc:'Hidden surprises reward curious explorers and create delight.'},
  {name:'Glowing Choice', desc:'Highlighting one option makes it feel special and urgent.'},
  {name:'Rolling Rewards', desc:'Rewards that build over time create anticipation for the next cycle.'},
  {name:'Sudden Reward', desc:'Unexpected bonuses create emotional spikes stronger than any announcement.'},
  {name:'Mini Quest', desc:'Small side-challenges break monotony and reward exploration.'},
  {name:'Visual Storytelling', desc:'Showing events as they unfold keeps users engaged with what happens next.'},
  {name:'Evolved UI', desc:'An interface that reveals new features over time sustains long-term curiosity.'},
];

let currentScratch = null;
let scratchRevealed = false;

function pickScratch() {
  return SCRATCH_POOL[Math.floor(Math.random() * SCRATCH_POOL.length)];
}

function renderScratchCard() {
  currentScratch = pickScratch();
  scratchRevealed = false;
  return `
  <div class="demo-title">Scratch Card</div>
  <div style="background:#0d1117;border-radius:12px;padding:16px;border:1px solid #21262d;text-align:center">
    <div style="font-size:.72rem;color:#6b7280;margin-bottom:14px">Click to reveal a hidden technique</div>
    <div id="scratch-card" onclick="revealScratch()" style="position:relative;height:110px;border-radius:10px;overflow:hidden;cursor:pointer;margin-bottom:14px">
      <!-- Revealed content (behind) -->
      <div style="position:absolute;inset:0;background:linear-gradient(135deg,#0e4d4d,#0d3d5a);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:12px">
        <div id="scratch-technique" style="font-size:.95rem;font-weight:900;color:#06B6D4">${currentScratch.name}</div>
        <div id="scratch-desc" style="font-size:.75rem;color:#8b949e;line-height:1.5;max-width:220px">${currentScratch.desc}</div>
      </div>
      <!-- Scratch overlay (on top) -->
      <div id="scratch-overlay" style="position:absolute;inset:0;background:repeating-linear-gradient(45deg,#21262d,#21262d 4px,#1c2129 4px,#1c2129 8px);display:flex;align-items:center;justify-content:center;transition:opacity .5s">
        <div style="font-size:1.8rem">🪙</div>
        <div style="font-size:.75rem;color:#8b949e;margin-left:8px">Scratch here</div>
      </div>
    </div>
    <button onclick="resetScratch()" style="background:#161b22;color:#06B6D4;border:1px solid #06B6D4;border-radius:8px;padding:7px 16px;font-size:.78rem;font-weight:700;cursor:pointer">↺ Scratch another</button>
  </div>`;
}

window.revealScratch = function() {
  if (scratchRevealed) return;
  scratchRevealed = true;
  const overlay = document.getElementById('scratch-overlay');
  if (overlay) { overlay.style.opacity = '0'; overlay.style.pointerEvents = 'none'; }
};

window.resetScratch = function() {
  const demoEl = document.getElementById('demo-content');
  if (demoEl) demoEl.innerHTML = renderScratchCard();
};

function initScratchCard() {}

// ── CD8: Streak Tracker ──────────────────────────────────────
let streakKept = false;

function renderStreakTracker() {
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const filledDays = [0,1,2,3,4];
  const todayIdx = 5;

  const dayDots = days.map((day, i) => {
    let bg, border, color;
    if (streakKept && i === todayIdx) {
      bg = '#10B981'; border = '#059669'; color = '#6ee7b7';
    } else if (filledDays.includes(i)) {
      bg = '#EF4444'; border = '#dc2626'; color = '#fca5a5';
    } else if (i === todayIdx) {
      bg = 'transparent'; border = '#EF4444'; color = '#EF4444';
    } else {
      bg = '#21262d'; border = '#30363d'; color = '#6b7280';
    }
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px">
      <div style="width:28px;height:28px;border-radius:50%;background:${bg};border:2px solid ${border};display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;color:${color}">${i === todayIdx ? (streakKept ? '✓' : '?') : '✓'}</div>
      <div style="font-size:.55rem;color:#6b7280">${day}</div>
    </div>`;
  }).join('');

  const warningHtml = streakKept
    ? `<div style="display:flex;align-items:center;gap:6px;background:#064e3b;border-radius:8px;padding:8px 12px;border:1px solid #059669;font-size:.78rem;color:#6ee7b7"><span>✓</span> Streak protected — 6 days strong!</div>`
    : `<div style="display:flex;align-items:center;gap:6px;background:#450a0a;border-radius:8px;padding:8px 12px;border:1px solid #dc2626;font-size:.78rem;color:#fca5a5"><span>⚠️</span> Streak at risk — complete today's task to keep it!</div>`;

  return `
  <div class="demo-title">Streak Tracker</div>
  <div style="background:#0d1117;border-radius:12px;padding:16px;border:1px solid #21262d">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <span style="font-size:1.8rem">🔥</span>
      <div>
        <div style="font-size:1.2rem;font-weight:900;color:${streakKept ? '#10B981' : '#EF4444'}">${streakKept ? 6 : 5} day streak</div>
        <div style="font-size:.68rem;color:#6b7280">Keep going — don't break the chain</div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:14px">${dayDots}</div>
    ${warningHtml}
    ${streakKept ? '' : `<button onclick="keepStreak()" style="width:100%;margin-top:10px;background:#EF4444;color:#fff;border:none;border-radius:8px;padding:10px;font-size:.84rem;font-weight:700;cursor:pointer">🔥 Keep My Streak</button>`}
  </div>`;
}

window.keepStreak = function() {
  streakKept = true;
  const demoEl = document.getElementById('demo-content');
  if (demoEl) { demoEl.innerHTML = renderStreakTracker(); }
};

function initStreakTracker() { streakKept = false; }
</script>
